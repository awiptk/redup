name: Build Redup APK with Bacol

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: termux/termux-docker:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          apt update && apt upgrade -y
          apt install -y openjdk-17 aapt2 dx zipalign apksigner zip wget

      - name: Download android.jar
        run: |
          mkdir -p ~/android-sdk/platforms/android-30
          wget -q -O ~/android-sdk/platforms/android-30/android.jar \
            https://raw.githubusercontent.com/termux/termux-app/master/scripts/android.jar
          echo "ANDROID_JAR=~/android-sdk/platforms/android-30/android.jar" >> $GITHUB_ENV

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build APK
        run: |
          chmod +x build.sh
          bash build.sh

      - name: Sign APK
        run: |
          apksigner sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out output/Redup-release.apk \
            output/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Redup-Release
          path: output/Redup-release.apk
