name: Build Redup APK with Bacol

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y zipalign apksigner zip wget unzip

      - name: Download Android SDK Tools
        run: |
          # Download commandlinetools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          # Set environment
          export ANDROID_HOME=$HOME/android-sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          
          # Install build-tools
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" --sdk_root=$ANDROID_HOME
          
          # Set paths
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          echo "ANDROID_JAR=$ANDROID_HOME/platforms/android-34/android.jar" >> $GITHUB_ENV

      - name: Download dx
        run: |
          mkdir -p $HOME/bin
          wget -q -O $HOME/bin/dx https://raw.githubusercontent.com/termux/termux-app/master/scripts/dx
          chmod +x $HOME/bin/dx
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build APK
        run: |
          chmod +x build.sh
          bash build.sh

      - name: Sign APK
        run: |
          apksigner sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out output/Redup-release.apk \
            output/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Redup-Release
          path: output/Redup-release.apk
